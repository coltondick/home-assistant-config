- alias: "Turn off the laundry room lights after 10 minutes"
  trigger:
    platform: state
    entity_id: light.laundry_room_ceiling
    from: "off"
    to: "on"
    for:
      hours: 0
      minutes: 10
      seconds: 0
  condition: []
  action:
    service: light.turn_off
    data:
      entity_id: light.laundry_room_ceiling
