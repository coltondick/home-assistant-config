- id: "434345356576776"
  alias: "State Triggered: Turn on|off vanity lights when motion no longer detected."
  description: ""
  trigger:
    - entity_id: binary_sensor.bedroom_motion_occupancy
      platform: state
      to: "off"
      for:
        minutes: 5
  condition:
    - condition: state
      entity_id: switch.vanity
      state: "on"
  action:
    - service: switch.turn_off
      target:
        entity_id: switch.vanity
