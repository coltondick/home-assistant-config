- alias: "Time Triggered: Turn off the vanity lights after 45 minutes"
  trigger:
    platform: state
    entity_id: switch.vanity
    from: "off"
    to: "on"
    for:
      hours: 0
      minutes: 45
      seconds: 0
  condition: []
  action:
    service: switch.turn_off
    data:
      entity_id: switch.vanity
