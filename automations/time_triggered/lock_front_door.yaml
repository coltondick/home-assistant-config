# Automatically lock the front door after 20 minutes if someone forgets to lock it behind them.
- alias: "Time Triggered: Lock front door after 20 minutes"
  trigger:
    platform: state
    entity_id: lock.front_door
    from: "locked"
    to: "unlocked"
    for:
      hours: 0
      minutes: 20
      seconds: 0
  #   condition: template # only notify once every 10 minutes at most
  #   value_template: "{{ ( as_timestamp(now()) - as_timestamp(state_attr('lock.front_door', 'last_changed')) |int(0) ) > 3600 }}"
  action:
    service: lock.lock
    data:
      entity_id: lock.front_door

# Automatically check every 5 minutes if we are not home if the door is locked, if not, lock it.
- alias: "Time Triggered: Lock front door after 5 minutes"
  trigger:
    platform: time_pattern
    minutes: /5
  condition:
    - condition: state
      entity_id: lock.front_door
      state: "unlocked"
    - condition: and
      conditions:
        - condition: template
          value_template: "{{ not is_state('person.miranda', 'home') }}"
        - condition: state
          entity_id: person.colton
          state: not_home
        - condition: numeric_state
          entity_id: sensor.tim_presence_detection
          below: 50
  action:
    service: lock.lock
    data:
      entity_id: lock.front_door

# Automatically lock the front door 2 minutes after we leave.
- alias: "Time Triggered: Lock front door after 2 minutes"
  trigger:
    platform: state
    entity_id: person.colton
    from: home
    to: not_home
    for:
      hours: 0
      minutes: 2
      seconds: 0
  condition:
    - condition: template
      value_template: "{{ not is_state('person.miranda', 'home') }}"
    - condition: and
      conditions:
        - condition: state
          entity_id: lock.front_door
          state: unlocked
  action:
    service: lock.lock
    data:
      entity_id: lock.front_door
