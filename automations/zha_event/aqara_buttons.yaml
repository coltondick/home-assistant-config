- id: "342342346464564"
  alias: "ZHA Event: Office Button"
  mode: restart
  trigger:
    - platform: event
      event_type: state_changed
      event_data:
        entity_id: sensor.office_button_action
  action:
    - variables:
        command: "{{ trigger.event.data.new_state.state }}"
    - choose:
        - conditions:
            - "{{ trigger.event.data.new_state.state == 'single' }}"
          sequence:
            - service: light.turn_on
              data: {}
              target:
                entity_id: light.office_ceiling_lights
        - conditions:
            - "{{ trigger.event.data.new_state.state == 'double' }}"
          sequence:
            - service: light.turn_off
              data: {}
              target:
                entity_id: light.office_ceiling_lights
