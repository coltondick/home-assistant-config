# down_quadruple_press

## Device identification ##
# office_remote:
#    device_id:fd8b11daa2de4432b84fed5e1b29fdcb
# mbr_remote:
#    device_id:657d3dc5eaeb4c11b19df5b38c794d8b
- id: hueofficeremote
  alias: "Office Hue Remote"
  trigger:
    - platform: event
      event_type: zha_event
      event_data:
        device_id: fd8b11daa2de4432b84fed5e1b29fdcb
  action:
    - variables:
        command: "{{ trigger.event.data.command }}"
        cluster_id: "{{ trigger.event.data.cluster_id }}"
        endpoint_id: "{{ trigger.event.data.endpoint_id }}"
        args: "{{ trigger.event.data.args }}"
    - choose:
        - conditions:
            - "{{ command == 'on_short_release' }}"
            - "{{ cluster_id == 64512 }}"
            - "{{ endpoint_id == 2 }}"
          sequence:
            - service: light.turn_on
              target:
                entity_id: light.office_ceiling_group
              data:
                transition: 1
                brightness_pct: 100
        - conditions:
            - "{{ command == 'off_with_effect' }}"
            - "{{ cluster_id == 6 }}"
            - "{{ endpoint_id == 1 }}"
            - "{{ args == [0, 0] }}"
          sequence:
            - service: light.turn_off
              target:
                entity_id: light.office_ceiling_group
              data:
                transition: 1
        - conditions:
            - "{{ command == 'step' }}"
            - "{{ cluster_id == 8 }}"
            - "{{ endpoint_id == 1 }}"
            - "{{ args == [0, 30, 9] }}"
          sequence:
            - service: light.turn_on
              target:
                entity_id: light.office_ceiling_group
              data:
                brightness_step_pct: 10
                transition: 1
        - conditions:
            - "{{ command == 'step' }}"
            - "{{ cluster_id == 8 }}"
            - "{{ endpoint_id == 1 }}"
            - "{{ args == [0, 56, 9] }}"
          sequence:
            - service: light.turn_on
              target:
                entity_id: light.office_ceiling_group
              data:
                brightness_step_pct: 25
                transition: 1
        - conditions:
            - "{{ command == 'step' }}"
            - "{{ cluster_id == 8 }}"
            - "{{ endpoint_id == 1 }}"
            - "{{ args == [1, 30, 9] }}"
          sequence:
            - service: light.turn_on
              target:
                entity_id: light.office_ceiling_group
              data:
                brightness_step_pct: -10
                transition: 1
        - conditions:
            - "{{ command == 'step' }}"
            - "{{ cluster_id == 8 }}"
            - "{{ endpoint_id == 1 }}"
            - "{{ args == [1, 56, 9] }}"
          sequence:
            - service: light.turn_on
              target:
                entity_id: light.office_ceiling_group
              data:
                brightness_step_pct: -25
                transition: 1
