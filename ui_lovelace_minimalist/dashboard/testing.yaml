---
button_card_templates: !include_dir_merge_named "../../custom_components/ui_lovelace_minimalist/__ui_minimalist__/ulm_templates/"
decluttering_templates: !include_dir_merge_named "../../ui_lovelace_minimalist/decluttering_templates"

title: Testing
swipe_nav:
  wrap: true
  animate: fade
  prevent_default: true
  swipe_amount: 15
  skip_tabs: 2,3,4,5,6,7,8,9
views:
  ## BEGIN TEST HOME ###
  - title: Test Home
    path: test-home
    icon: mdi:picture-in-picture-bottom-right
    badges: []
    cards:
      - type: vertical-stack
        cards:
          ## Chips Row ##
          - type: horizontal-stack
            cards: !include ../common/chips-row.yaml
          - type: "custom:button-card"
            color_type: blank-card
          ## Persons Card ##
          - type: horizontal-stack
            cards:
              - template: person_card_new
                type: custom:decluttering-card
                card_mod:
                  style: |
                    .card-header {
                      ha-card: 100px !important;
                      }
                variables:
                  - entity: person.colton
                  - name: Colton
                  - show_name: false
                  - show_state: false
                  - battery: device_tracker.life360_colton
                  - wifi: sensor.colton_s_samsung_wifi_connection
                  - entity_picture: /local/colton.jpg
                  - show_entity_picture: true
                  - tap_action:
                      action: more-info
                      haptic: light
              - template: person_card_new
                type: custom:decluttering-card
                variables:
                  - entity: person.miranda
                  - name: Miranda
                  - show_name: false
                  - show_state: false
                  - battery: device_tracker.life360_miranda
                  - wifi: sensor.miranda_wifi_connection
                  - entity_picture: /local/miranda.jpg
                  - show_entity_picture: true
                  - tap_action:
                      action: more-info
                      haptic: light

          ## Buttons ##
          - type: horizontal-stack
            cards: !include ../common/buttons-card.yaml
          # title card
          - type: horizontal-stack
            cards:
              - type: "custom:button-card"
                color_type: blank-card
              - type: "custom:button-card"
                template: card_title
                name: Heating
              - type: "custom:button-card"
                color_type: blank-card

          - type: horizontal-stack
            cards:
              - type: "custom:button-card"
                template: custom_card_coltondick_thermostat
                entity: climate.living_room_thermostats
                variables:
                  ulm_card_thermostat_enable_collapse: false
                  ulm_card_thermostat_enable_controls: true
                  ulm_card_thermostat_enable_background_color: true
                  ulm_card_thermostat_enable_hvac_modes: false
                  ulm_card_thermostat_enable_popup: false
      - type: vertical-stack
        cards:
          # title card
          - type: horizontal-stack
            cards:
              - type: "custom:button-card"
                color_type: blank-card
              - type: "custom:button-card"
                template: card_title
                name: Rooms
              - type: "custom:button-card"
                color_type: blank-card
          - type: horizontal-stack
            cards:
              ## Entry Way ##
              - type: "custom:button-card"
                template:
                  - custom_card_coltondick_room
                  - grey_off
                  - blue_on
                name: Entry Way
                entity: light.entryway_ceiling
                icon: hue:room-hallway
                templates:
                  - yellow_on
                tap_action:
                  action: toggle
                variables:
                  label_use_temperature: false
                  label_use_brightness: false
                  room_temperature: sensor.average_indoor_temperature
                  entity_1:
                    entity_id: lock.front_door
                    templates:
                      - custom_coltondick_lock_on
                      - custom_coltondick_lock_off
                    tap_action:
                      action: toggle
                  entity_2:
                    entity_id: switch.patio_lights
                    templates:
                      - green_on
                      - grey_off
                    tap_action:
                      action: toggle
                  entity_3:
                    entity_id: light.laundry_room_ceiling
                    templates:
                      - green_on
                      - grey_off
                  entity_4:
                    entity_id: binary_sensor.aqara_front_door
                    templates:
                      - red_on
                      - green_off
                ## Dining Room ##
              - type: "custom:button-card"
                template:
                  - custom_card_coltondick_room
                  - grey_off
                  - blue_on
                name: Dining Room
                entity: light.dining_room_ceiling
                icon: hue:room-dining
                templates:
                  - yellow_on
                tap_action:
                  action: toggle
                variables:
                  label_use_temperature: true
                  label_use_brightness: false
                  room_temperature: sensor.dining_room_temperature
                  entity_1:
                    entity_id: light.hue_light_strip
                    templates:
                      - green_on
                      - grey_off
                    tap_action:
                      action: toggle
                  entity_2:
                    entity_id: switch.scentsy
                    templates:
                      - yellow_on
                      - grey_off
                    tap_action:
                      action: toggle
          - type: horizontal-stack
            cards:
              ## Kitchen ##
              - type: "custom:button-card"
                template:
                  - custom_card_coltondick_room
                  - grey_off
                  - blue_on
                name: Kitchen
                entity: light.kitchen_ceiling
                icon: hue:room-kitchen
                templates:
                  - yellow_on
                tap_action:
                  action: toggle
                variables:
                  label_use_temperature: false
                  label_use_brightness: false
                  entity_1:
                    entity_id: light.kitchen_stove
                    templates:
                      - green_on
                      - grey_off
                    tap_action:
                      action: toggle
                  entity_2:
                    entity_id: switch.kitchen_leds
                    templates:
                      - yellow_on
                      - grey_off
                    tap_action:
                      action: toggle
              ## Living Room ##
              - type: "custom:button-card"
                template:
                  - custom_card_coltondick_room
                  - grey_off
                  - blue_on
                name: Living Room
                entity: light.living_room_ceiling
                icon: hue:room-living
                templates:
                  - yellow_on
                tap_action:
                  action: toggle
                variables:
                  label_use_temperature: true
                  label_use_brightness: false
                  room_temperature: sensor.living_room_temperature
                  entity_1:
                    entity_id: remote.tv
                    templates:
                      - green_on
                      - grey_off
                    tap_action:
                      action: toggle
                  entity_2:
                    entity_id: switch.side_table_lamp
                    templates:
                      - yellow_on
                      - grey_off
                    tap_action:
                      action: toggle
                  entity_3:
                    entity_id: switch.cage
                    templates:
                      - yellow_on
                      - grey_off
                    tap_action:
                      action: toggle
                  entity_4:
                    entity_id: light.tv_leds
                    templates:
                      - yellow_on
                      - grey_off
                    tap_action:
                      action: toggle
          - type: horizontal-stack
            cards:
              ## Master ##
              - type: "custom:button-card"
                template:
                  - custom_card_coltondick_room
                  - grey_off
                  - blue_on
                name: Master Bedroom
                entity: group.bedroom
                icon: hue:room-bedroom
                templates:
                  - yellow_on
                tap_action:
                  action: toggle
                variables:
                  label_use_temperature: true
                  label_use_brightness: false
                  room_temperature: sensor.bedroom_thermostat_temperature
                  entity_1:
                    entity_id: remote.bedroom
                    templates:
                      - green_on
                      - grey_off
                    tap_action:
                      action: toggle
                  entity_2:
                    entity_id: switch.vanity
                    templates:
                      - red_on
                      - grey_off
                    tap_action:
                      action: toggle
                  entity_3:
                    entity_id: switch.bedroom_sidetable_lamp
                    templates:
                      - yellow_on
                      - grey_off
                    tap_action:
                      action: toggle
                  entity_4:
                    entity_id: binary_sensor.bedroom_door
                    templates:
                      - red_on
                      - green_off
              ## Office ##
              - type: "custom:button-card"
                template:
                  - custom_card_coltondick_room
                  - grey_off
                  - blue_on
                name: Office
                entity: light.office_ceiling_group
                icon: hue:room-office
                templates:
                  - yellow_on
                tap_action:
                  action: toggle
                variables:
                  label_use_temperature: true
                  label_use_brightness: false
                  room_temperature: sensor.office_temperature
                  entity_1:
                    entity_id: media_player.spotify_colt_dick
                    templates:
                      - custom_coltondick_media_on
                      - custom_coltondick_media_off
                    tap_action:
                      action: call-service
                      service: script.play_pause_spotify
                      service_data:
                        entity_id: media_player.spotify_colt_dick
                  entity_2:
                    entity_id: binary_sensor.office_door
                    templates:
                      - red_on
                      - green_off
