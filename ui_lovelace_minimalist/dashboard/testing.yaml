---
button_card_templates: !include_dir_merge_named "../../custom_components/ui_lovelace_minimalist/__ui_minimalist__/ulm_templates/"
decluttering_templates: !include_dir_merge_named "../../ui_lovelace_minimalist/decluttering_templates"

title: Testing
swipe_nav:
  wrap: true
  animate: fade
  prevent_default: true
  swipe_amount: 15
  skip_tabs: 2,3,4,5,6,7,8,9
views:
  ## BEGIN TEST HOME ###
  - title: Test Home
    path: test-home
    icon: mdi:picture-in-picture-bottom-right
    badges: []
    cards:
      - type: "custom:button-card"
        template: radial_icon_info
        variables:
          entity_1: sensor.processor_use_percent
          entity_1_name: "CPU Usage"
          entity_1_color: red
          entity_1_icon: mdi:cpu-64-bit
          entity_1_min: 0
          entity_1_max: 100
          entity_2: sensor.disk_use_percent_share
          entity_2_name: "/share/"
          entity_2_color: green
          entity_2_icon: mdi:harddisk
          entity_2_min: 0
          entity_2_max: 100
