  - theme: Nordic
    icon: mdi:thermometer
    title: Thermostats
    badges: []
    cards:
      - control: true
        entity: climate.bathroom_thermostat
        icon: true
        name: Bathroom
        step_layout: row
        type: custom:simple-thermostat
