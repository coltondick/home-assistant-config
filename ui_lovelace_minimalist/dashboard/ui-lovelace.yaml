---
button_card_templates: !include_dir_merge_named "../../custom_components/ui_lovelace_minimalist/__ui_minimalist__/ulm_templates/"
decluttering_templates: !include_dir_merge_named "../../custom_ui/decluttering_templates"

title: Home
swipe_nav:
  wrap: true
  animate: fade
  prevent_default: true
  swipe_amount: 15
  skip_tabs: 2,3

views:
  - icon: mdi:home-assistant
    path: new
    title: Home
    badges: []
    cards:
      - cards:
          - entity_id:
              "1": null
            matches: ^toggle (.+\..+)
            max_results: 10
            name: Toggle {1}
            service: homeassistant.toggle
            service_data: null
            type: custom:search-card
          - entity: alarm_control_panel.panel
            name: Alarm
            states:
              - arm_home
              - arm_away
            type: alarm-panel
            # theme: minimalist-desktop-nord
          - type: horizontal-stack
            cards:
              - type: custom:decluttering-card
                template: person_card_new
                variables:
                  - entity: person.colton
                  - name: Colton
                  - show_name: false
                  - show_state: false
                  - battery: device_tracker.life360_colton
                  - wifi: sensor.colton_s_samsung_wifi_connection
                  - entity_picture: /local/colton.jpg
                  - show_entity_picture: true
                  - tap_action:
                      action: more-info
                      haptic: light
              - type: custom:decluttering-card
                template: person_card_new
                variables:
                  - entity: person.miranda
                  - name: Miranda
                  - show_name: false
                  - show_state: false
                  - battery: device_tracker.life360_miranda
                  - wifi: sensor.miranda_wifi_connection
                  - entity_picture: /local/miranda.jpg
                  - show_entity_picture: true
                  - tap_action:
                      action: more-info
                      haptic: light
          - cards:
              - show_name: true
                show_icon: true
                entity: input_boolean.override_home
                hold_action:
                  action: more-info
                icon_height: 50px
                show_state: true
                tap_action:
                  action: toggle
                type: button
                icon: ios:house-fill
                name: Override
              - show_name: true
                show_icon: true
                hold_action:
                  action: call-service
                  service: media_player.media_stop
                  service_data:
                    entity_id: media_player.bedroom_pair
                icon: ios:bed-double
                icon_height: 50px
                name: Sleep
                show_state: false
                tap_action:
                  action: call-service
                  service: shell_command.white_noise
                type: button
                card_mod:
                  style: |
                    span {
                    margin-bottom: 20px
                    }
              - show_name: true
                show_icon: true
                type: button
                tap_action:
                  action: toggle
                entity: switch.party_switch
                icon: ios:theatermasks-fill
                show_state: true
                icon_height: 50px
                name: Party
              - show_name: true
                show_icon: true
                type: button
                tap_action:
                  action: toggle
                entity: input_boolean.vacation_mode
                show_state: true
                icon: ios:globe-americas-fill
                icon_height: 50px
                name: Vacation
            type: horizontal-stack
          - entities:
              - entity: light.office_ceiling_group
              - entity: binary_sensor.office_motion
                name: Motion
            title: Office
            type: entities
        type: vertical-stack
      - entities:
          - entity: remote.tv
          - entity: light.tv_leds
          - entity: switch.cage
          - entity: light.living_room_ceiling
          - entity: switch.side_table_lamp
          - entity: binary_sensor.living_room_motion
        title: Living Room
        type: entities
      - entities:
          - entity: binary_sensor.front_door
          - entity: lock.front_door
          - entity: alarm_control_panel.panel
          - entity: light.entryway_ceiling
          - entity: switch.patio_lights
            icon: mdi:string-lights
        show_header_toggle: false
        title: Entryway
        type: entities
      - entities:
          - entity: group.bedroom
          - entity: switch.vanity
          - entity: remote.bedroom
          - entity: binary_sensor.bedroom_door
          - entity: binary_sensor.master_bedroom_motion
          - entity: switch.bedroom_sidetable_lamp
            name: Lamp
            icon: mdi:lamp
        title: Master Bedroom
        type: entities
      - entities:
          - entity: switch.scentsy
          - entity: light.dining_room_ceiling
          - entity: light.hue_light_strip
          - entity: binary_sensor.dining_room_motion
            name: Motion
          - entity: binary_sensor.smoke_detector
          - entity: binary_sensor.hallway_co_detector
        title: Dining Room
        type: entities
      - cards:
          - entities:
              - entity: light.kitchen_ceiling
              - entity: switch.kitchen_leds
              - entity: light.kitchen_stove
            title: Kitchen
            type: entities
          - entities:
              - entity: light.laundry_room_ceiling
            title: Laundry Room
            type: entities
        type: vertical-stack
  - icon: mdi:tablet-dashboard
    panel: false
    title: ""
    badges: []
    cards:
      - type: vertical-stack
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:mini-graph-card
                entities:
                  - sensor.temperature
                name: Weather
                line_color: var(--aurora-red)
                line_width: 8
                font_size: 100
                hours_to_show: 168
                points_per_hour: 0.25
              - type: custom:mini-graph-card
                entities:
                  - sensor.humidity
                name: Outdoor Humidity
                line_color: var(--aurora-blue)
                line_width: 8
                font_size: 100
                hours_to_show: 168
                points_per_hour: 0.25
          - type: horizontal-stack
            cards:
              - type: custom:mini-graph-card
                entities:
                  - sensor.cage_temperature
                name: Indoor Temperature
                icon: mdi:thermometer
                line_color: var(--aurora-yellow)
                line_width: 8
                font_size: 100
                hours_to_show: 168
                points_per_hour: 0.25
              - type: custom:mini-graph-card
                entities:
                  - sensor.cage_humidity
                name: Indoor Humidity
                icon: mdi:water-percent
                line_color: var(--aurora-green)
                line_width: 8
                font_size: 100
                hours_to_show: 168
                points_per_hour: 0.25
          - type: horizontal-stack
            cards:
              - type: custom:mini-graph-card
                entities:
                  - sensor.wind_speed
                name: Wind
                icon: mdi:weather-windy
                line_color: var(--aurora-orange)
                line_width: 8
                font_size: 100
                hours_to_show: 168
                points_per_hour: 0.25
              - type: custom:mini-graph-card
                entities:
                  - sensor.u_s_air_quality_index
                name: Air Quality
                icon: mdi:weather-windy
                line_color: var(--aurora-pink)
                line_width: 8
                font_size: 75
                hours_to_show: 168
                points_per_hour: 0.25
          - type: horizontal-stack
            cards:
              - type: custom:mini-graph-card
                entities:
                  - sensor.airgradient_pm2_5
                name: Indoor PM2.5
                icon: mdi:weather-windy
                line_color: var(--aurora-red)
                line_width: 8
                font_size: 100
                hours_to_show: 168
                points_per_hour: 0.25
                tap_action:
                  action: url
                  url: >-
                    http://192.168.1.3:3000/d/MbIr5N7nk/historical-stats?orgId=1&viewPanel=6
              - type: custom:mini-graph-card
                entities:
                  - sensor.airgradient_c02
                name: Indoor C02
                icon: mdi:weather-windy
                line_color: var(--aurora-blue)
                line_width: 8
                font_size: 100
                hours_to_show: 168
                points_per_hour: 0.25
      - type: horizontal-stack
        cards:
          - type: custom:mini-graph-card
            entities:
              - sensor.office_temperature
            name: Office
            line_color: var(--aurora-pink)
            line_width: 8
            font_size: 100
            hours_to_show: 168
            points_per_hour: 0.25
          - type: custom:mini-graph-card
            entities:
              - sensor.bedroom_thermostat_temperature
            name: Master
            line_color: var(--aurora-orange)
            line_width: 8
            font_size: 100
            hours_to_show: 168
            points_per_hour: 0.25
          - type: custom:mini-graph-card
            entities:
              - sensor.living_room_temperature
            name: Living Room
            line_color: var(--aurora-blue)
            line_width: 8
            font_size: 100
            hours_to_show: 168
            points_per_hour: 0.25
      - type: vertical-stack
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                tap_action:
                  action: toggle
                entity: switch.cage
                show_state: true
                show_entity_picture: true
                state:
                  - icon: ios:pawprint
                    value: "off"
                    styles:
                      name:
                        - padding-top: 10px
                  - icon: ios:pawprint-fill
                    value: "on"
                    styles:
                      name:
                        - padding-top: 10px
              - type: custom:button-card
                tap_action:
                  action: toggle
                name: Lamp
                entity: switch.side_table_lamp
                show_state: true
                show_entity_picture: true
                state:
                  - icon: hue:table-shade
                    value: "off"
                    styles:
                      name:
                        - padding-top: 10px
                  - icon: hue:table-shade
                    value: "on"
                    styles:
                      name:
                        - padding-top: 10px
              - type: custom:button-card
                tap_action:
                  action: toggle
                name: TV
                entity: remote.tv
                show_state: true
                show_entity_picture: true
                state:
                  - icon: ios:tv
                    value: "off"
                    styles:
                      name:
                        - padding-top: 10px
                  - icon: ios:tv-inset-filled
                    value: "on"
                    styles:
                      name:
                        - padding-top: 10px
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                tap_action:
                  action: toggle
                name: Kitchen
                entity: group.kitchen
                show_state: true
                show_entity_picture: true
                state:
                  - icon: ios:fork-knife
                    value: "off"
                    styles:
                      name:
                        - padding-top: 10px
                  - icon: ios:fork-knife
                    value: "on"
                    styles:
                      name:
                        - padding-top: 10px
              - type: custom:button-card
                tap_action:
                  action: toggle
                name: Living Room
                entity: group.livingroom
                show_state: true
                state:
                  - icon: mdi:sofa-single-outline
                    value: "off"
                    styles:
                      name:
                        - padding-top: 10px
                  - icon: mdi:sofa-single
                    value: "on"
                    styles:
                      name:
                        - padding-top: 10px
              - type: custom:button-card
                tap_action:
                  action: toggle
                entity: group.dining
                name: Dining Room
                show_state: true
                show_entity_picture: true
                state:
                  - icon: bha:ceiling-lamp
                    value: "off"
                    styles:
                      name:
                        - padding-top: 10px
                  - icon: bha:ceiling-lamp
                    value: "on"
                    styles:
                      name:
                        - padding-top: 10px
          - type: horizontal-stack
            cards:
              - type: custom:simple-thermostat
                entity: climate.living_room_thermostats
                icon: false
                name: Living Room
                step_layout: row
                header: true
                control: false
                layout:
                  mode:
                    icons: true
  - icon: mdi:thermometer
    title: Thermostats
    badges: []
    cards:
      - control: true
        entity: climate.bathroom_thermostat
        icon: true
        name: Bathroom
        step_layout: row
        type: custom:simple-thermostat
      - control: true
        entity: climate.bedroom_thermostat
        icon: true
        name: Bedroom
        step_layout: row
        type: custom:simple-thermostat
      - control: true
        entity: climate.office_thermostat
        icon: true
        name: Office
        step_layout: row
        type: custom:simple-thermostat
      - control: true
        entity: climate.living_room_thermostats
        icon: true
        name: Living Room
        step_layout: row
        type: custom:simple-thermostat
      - columns: 4
        entities:
          - entity: sensor.cage_temperature
          - entity: sensor.cage_humidity
          - entity: sensor.cage_pressure
          - entity: sensor.cage_power
        show_name: false
        title: Cage
        type: glance
      - control: true
        entity: climate.living_room_thermostat
        icon: true
        name: Living Room
        step_layout: row
        type: custom:simple-thermostat
      - control: true
        entity: climate.dining_room_thermostat
        icon: true
        name: Living Room
        step_layout: row
        type: custom:simple-thermostat
  - icon: mdi:server
    path: server
    title: Server
    badges: []
    cards:
      - entities:
          - entity: switch.pi_hole
          - entity: sensor.pihole_status
          - entity: sensor.pi_hole_ads_blocked_today
          - entity: sensor.pi_hole_ads_percentage_blocked_today
          - entity: sensor.pi_hole_dns_queries_forwarded
          - entity: sensor.pi_hole_dns_queries_today
          - entity: sensor.pi_hole_dns_unique_clients
          - entity: sensor.pi_hole_dns_unique_domains
          - entity: sensor.pi_hole_domains_blocked
          - entity: sensor.pi_hole_seen_clients
        title: PIhole Status
        type: entities
      - entities:
          - entity: sensor.disk_use_percent_share
          - entity: sensor.memory_free
          - entity: sensor.processor_use_percent
        title: Server Status
        type: entities
      - entities:
          - entity: sensor.radarr_movies
          - entity: sensor.radarr_disk_space
          - entity: sensor.radarr_upcoming
        title: Radarr
        type: entities
      - type: entities
        entities:
          - entity: switch.logitech_media_server
            icon: mdi:music
          - entity: switch.update_youtube_on_shield
            icon: mdi:youtube
        title: Restart
      - type: entities
        entities:
          - entity: sensor.speedtest_download
          - entity: sensor.speedtest_upload
          - entity: sensor.speedtest_ping
        title: Speedtest
  ## BEGIN TABLET HOME ###
  - title: Tablet Home
    path: tablet-home
    icon: mdi:picture-in-picture-bottom-right
    badges: []
    cards:
      - type: vertical-stack
        cards:
          - type: horizontal-stack
            cards:
              ## Chips Row ##
              - type: custom:button-card
                template: chip_temperature
                tap_action:
                  action: navigate
                  navigation_path: /ui-lovelace-minimalist/weather
                variables:
                  ulm_chip_temperature_inside: sensor.average_indoor_temperature
                  ulm_chip_temperature_outside: sensor.temperature
                  ulm_chip_temperature_weather: weather.kamloops
              - type: custom:button-card
                entity: alarm_control_panel.panel
                template: chip_alarm
                tap_action:
                  action: navigate
                  navigation_path: /ui-lovelace-minimalist/security
              - type: custom:button-card
                template: chip_presence_detection
                variables:
                  ulm_chip_presence_counter_residents: sensor.presence_detection
          ## Persons Card ##
          - type: horizontal-stack
            cards:
              - template: person_card_new
                type: custom:decluttering-card
                variables:
                  - entity: person.colton
                  - name: Colton
                  - show_name: false
                  - show_state: false
                  - battery: device_tracker.life360_colton
                  - wifi: sensor.colton_s_samsung_wifi_connection
                  - entity_picture: /local/colton.jpg
                  - show_entity_picture: true
                  - tap_action:
                      action: fire-dom-event
                      browser_mod:
                        card:
                          aspect_ratio: "16:9"
                          default_zoom: 18
                          entities:
                            - device_tracker.life360_colton
                          type: map
                        command: popup
                        hide_header: true
                        large: false
              - template: person_card_new
                type: custom:decluttering-card
                variables:
                  - entity: person.miranda
                  - name: Miranda
                  - show_name: false
                  - show_state: false
                  - battery: device_tracker.life360_miranda
                  - wifi: sensor.miranda_wifi_connection
                  - entity_picture: /local/miranda.jpg
                  - show_entity_picture: true
                  - tap_action:
                      action: more-info
                      haptic: light
          ## Buttons ##
          - type: horizontal-stack
            cards:
              - type: vertical-stack
                cards:
                  - type: "custom:button-card"
                    template:
                      - card_input_boolean
                      - green_on
                    entity: input_boolean.override_home
                    name: Override
                  - type: "custom:button-card"
                    template:
                      - card_input_boolean
                      - green_on
                    entity: switch.white_noise_onoff
                    name: Sleep
              - type: vertical-stack
                cards:
                  - type: "custom:button-card"
                    template:
                      - card_input_boolean
                      - green_on
                    entity: switch.party_switch
                    name: Party
                  - type: "custom:button-card"
                    template:
                      - card_input_boolean
                      - green_on
                    entity: input_boolean.vacation_mode
                    name: Vacation Mode
      ## Thermostat ##
      - type: vertical-stack
        cards:
          - type: "custom:button-card"
            template: custom_card_coltondick_thermostat
            entity: climate.living_room_thermostats
            variables:
              ulm_card_thermostat_enable_collapse: false
              ulm_card_thermostat_enable_controls: true
              ulm_card_thermostat_enable_background_color: false
              ulm_card_thermostat_enable_hvac_modes: false
              ulm_card_thermostat_enable_popup: false
      - type: vertical-stack
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                tap_action:
                  action: toggle
                entity: switch.cage
                show_state: true
                show_entity_picture: true
                state:
                  - icon: ios:pawprint
                    value: "off"
                    styles:
                      name:
                        - padding-top: 10px
                  - icon: ios:pawprint-fill
                    value: "on"
                    styles:
                      name:
                        - padding-top: 10px
              - type: custom:button-card
                tap_action:
                  action: toggle
                name: Lamp
                entity: switch.side_table_lamp
                show_state: true
                show_entity_picture: true
                state:
                  - icon: hue:table-shade
                    value: "off"
                    styles:
                      name:
                        - padding-top: 10px
                  - icon: hue:table-shade
                    value: "on"
                    styles:
                      name:
                        - padding-top: 10px
              - type: custom:button-card
                tap_action:
                  action: toggle
                name: TV
                entity: remote.tv
                show_state: true
                show_entity_picture: true
                state:
                  - icon: ios:tv
                    value: "off"
                    styles:
                      name:
                        - padding-top: 10px
                  - icon: ios:tv-inset-filled
                    value: "on"
                    styles:
                      name:
                        - padding-top: 10px
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                tap_action:
                  action: toggle
                name: Kitchen
                entity: group.kitchen
                show_state: true
                show_entity_picture: true
                state:
                  - icon: ios:fork-knife
                    value: "off"
                    styles:
                      name:
                        - padding-top: 10px
                  - icon: ios:fork-knife
                    value: "on"
                    styles:
                      name:
                        - padding-top: 10px
              - type: custom:button-card
                tap_action:
                  action: toggle
                name: Living Room
                entity: group.livingroom
                show_state: true
                state:
                  - icon: mdi:sofa-single-outline
                    value: "off"
                    styles:
                      name:
                        - padding-top: 10px
                  - icon: mdi:sofa-single
                    value: "on"
                    styles:
                      name:
                        - padding-top: 10px
              - type: custom:button-card
                tap_action:
                  action: toggle
                entity: group.dining
                name: Dining Room
                show_state: true
                show_entity_picture: true
                state:
                  - icon: bha:ceiling-lamp
                    value: "off"
                    styles:
                      name:
                        - padding-top: 10px
                  - icon: bha:ceiling-lamp
                    value: "on"
                    styles:
                      name:
                        - padding-top: 10px
      - type: horizontal-stack
        cards:
          - type: "custom:button-card"
            template:
              - custom_card_coltondick_room
              - grey_off
              - blue_on
            name: Living Room
            entity: group.livingroom
            icon: mdi:sofa-single-outline
            templates:
              - yellow_on
            tap_action:
              action: toggle
            variables:
              label_use_temperature: true
              label_use_brightness: false
              room_temperature: sensor.average_indoor_temperature
              entity_1:
                entity_id: switch.cage
                templates:
                  - blue_on
                  - grey_off
                tap_action:
                  action: toggle
              entity_2:
                entity_id: switch.side_table_lamp
                templates:
                  - yellow_on
                  - grey_off
                tap_action:
                  action: toggle
              entity_3:
                entity_id: remote.tv
                templates:
                  - green_on
                  - grey_off
                tap_action:
                  action: toggle
              entity_4:
                entity_id: climate.living_room_thermostats
                templates:
                  - green_on
                  - grey_off
                tap_action:
                  action: toggle
          - type: "custom:button-card"
            template:
              - card_room
              - grey_off
              - blue_on
            name: Living Room
            entity: sensor.average_indoor_temperature
            icon: mdi:sofa-single-outline
            templates:
              - yellow_on
            tap_action:
              action: navigate
              navigation_path: "/ui-lovelace-minimalist/living-room"
            variables:
              label_use_temperature: true
              label_use_brightness: false
              entity_1:
                entity_id: switch.cage
                templates:
                  - blue_on
                  - grey_off
                tap_action:
                  action: toggle
              entity_2:
                entity_id: switch.side_table_lamp
                templates:
                  - yellow_on
                  - grey_off
                tap_action:
                  action: toggle
              entity_3:
                entity_id: remote.tv
                templates:
                  - green_on
                  - grey_off
                tap_action:
                  action: toggle
  - title: Living Room
    path: living-room
    icon: mdi:sofa-outline
    badges: []
    cards:
      - type: "custom:button-card"
        template: chip_back
        variables:
          ulm_chip_back_path: /ui-lovelace-minimalist/tablet-home
      - type: vertical-stack
        cards:
          - type: horizontal-stack
            cards:
              - type: "custom:button-card"
                template: card_power_outlet
                entity: group.livingroom
                name: Living Room Lights
              - type: "custom:button-card"
                template: card_power_outlet
                entity: switch.cage
                name: Cage
          - type: horizontal-stack
            cards:
              - type: "custom:button-card"
                template: card_power_outlet
                entity: switch.side_table_lamp
                name: Lamp
              - type: "custom:button-card"
                template: card_generic
                entity: remote.tv
                name: TV
                tap_action:
                  action: toggle
          - type: horizontal-stack
            cards:
              - type: "custom:button-card"
                template: custom_card_coltondick_thermostat
                entity: climate.living_room_thermostats
                variables:
                  ulm_card_thermostat_enable_collapse: false
                  ulm_card_thermostat_enable_controls: true
                  ulm_card_thermostat_enable_background_color: false
                  ulm_card_thermostat_enable_hvac_modes: false
                  ulm_card_thermostat_enable_popup: false
          - type: horizontal-stack
            cards:
              - type: "custom:button-card"
                template: card_graph
                variables:
                  ulm_card_graph_color: "var(--aurora-green)"
                  ulm_card_graph_name: Living Room Temperature
                  ulm_card_graph_entity: sensor.living_room_temperature
  - title: Weather
    path: weather
    icon: mdi:sun-thermometer
    badges: []
    cards:
      ## Chip Back ##
      - type: "custom:button-card"
        template: chip_back
        variables:
          ulm_chip_back_path: /ui-lovelace-minimalist/tablet-home
      ## Sensor Graphs ##
      - type: vertical-stack
        cards:
          - type: horizontal-stack
            cards:
              - type: "custom:button-card"
                template: card_graph
                variables:
