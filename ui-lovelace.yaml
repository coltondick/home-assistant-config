title: Home
swipe_nav:
  wrap: true
  animate: fade
  prevent_default: true
  swipe_amount: 15
  skip_tabs: 2,3
decluttering_templates:
  person_card_new:
    default:
      - color: auto
      - background_color: var(--primary-background-color)
      - variable: spin
      - spin: false
      - show_name: true
      - show_state: true
      - show_label: false
      - show_icon: true
      - show_last_changed: false
      - show_entity_picture: false
      - tap_action:
          action: more-info
          haptic: light
      - aspect_ratio: 1/1
      - margin-right: 20px
      - label: "&nbsp;"
      - off_icon_color: gray
      - off_name_color: gray
      - off_state_color: gray
    card:
      type: custom:button-card
      battery: "[[battery]]"
      wifi: "[[wifi]]"
      home_sensor: "[[home_sensor]]"
      work_sensor: "[[work_sensor]]"
      work_icon: "[[work_icon]]"
      name: "[[name]]"
      icon: mdi:[[icon]]
      size: "[[size]]"
      color: "[[color]]"
      aspect_ratio: "[[aspect_ratio]]"
      entity: "[[entity]]"
      label: "[[label]]"
      show_name: "[[show_name]]"
      show_icon: "[[show_icon]]"
      show_state: "[[show_state]]"
      show_label: "[[show_label]]"
      show_last_changed: "[[show_last_changed]]"
      tap_action: "[[tap_action]]"
      hold_action: "[[hold_action]]"
      entity_picture: "[[entity_picture]]"
      show_entity_picture: "[[show_entity_picture]]"
      styles:
        card:
          - border-radius: 12px
          - "--card-background-color": "[[background_color]]"
        icon:
          - grid-column: 1
          - grid-row: 1 / 3
        label:
          - color: gray
          - font-size: 11px
          - padding: 0px 10px
          - justify-self: start
        state:
          - font-size: 12px
          - padding: 0px 10px
          - justify-self: start
          - text-transform: capitalize
          - font-weight: bold
          - padding-left: 10px
          - color: var(--primary-text-color)
        grid:
          - grid-template-areas: '"i i i" "status wifi battery"'
          - grid-template-columns: auto
          - grid-template-rows: 9fr 1fr
        img_cell:
          - align-self: start
          - text-align: start
        name:
          - justify-self: start
          - padding-left: 10px
          - font-weight: bold
          - font-size: 13px
        entity_picture:
          - height: 135px
          - width: 135px
          - border-radius: 100%
        custom_fields:
          blank:
            card:
              type: custom:button-card
              color_type: blank-card
          status:
            - align-self: start
            - justify-self: start
            - font-size: 12px
            - color: var(--secondary-text-color)
          wifi:
            - align-self: start
            - justify-self: start
            - font-size: 12px
            - color: var(--secondary-text-color)
          battery:
            - align-self: start
            - justify-self: start
            - font-size: 12px
            - color: var(--secondary-text-color)
      custom_fields:
        battery: |
          [[[
            if (states["[[battery]]"].attributes.battery >= 75) {
            if (states["[[battery]]"].attributes.battery_charging === false) {
              return `<ha-icon
                          icon="mdi:battery"
                          style="; --mdc-icon-size: 14px; padding-left: 6px; padding-right: 2px; color: var(--aurora-green); position: relative; bottom: 1px;">
                          </ha-icon><span>${states["[[battery]]"].attributes.battery}%</span>`
            } else {
              return `<ha-icon
                        icon="mdi:battery-charging"
                        style="; --mdc-icon-size: 14px; padding-left: 5px; padding-right: 2px; color: var(--aurora-green); position: relative; bottom: 1px;">
                        </ha-icon><span>${states["[[battery]]"].attributes.battery}%</span>`
            }
          } else if (states["[[battery]]"].attributes.battery <= 35) {
            if (states["[[battery]]"].attributes.battery_charging === false) {
              return `<ha-icon
                          icon="mdi:battery"
                          style="; --mdc-icon-size: 14px; padding-left: 6px; padding-right: 2px; color: var(-aurora-red); position: relative; bottom: 1px;">
                          </ha-icon><span>${states["[[battery]]"].attributes.battery}%</span>`
            } else {
              return `<ha-icon
                        icon="mdi:battery-charging"
                        style="; --mdc-icon-size: 14px; padding-left: 5px; padding-right: 2px; color: var(-aurora-red); position: relative; bottom: 1px;">
                        </ha-icon><span>${states["[[battery]]"].attributes.battery}%</span>`
            }
          } else {
            if (states["[[battery]]"].attributes.battery_charging === false) {
              return `<ha-icon
                          icon="mdi:battery"
                          style="; --mdc-icon-size: 14px; padding-left: 6px; padding-right: 2px; color: var(--primary-color); position: relative; bottom: 1px;">
                          </ha-icon><span>${states["[[battery]]"].attributes.battery}%</span>`
            } else {
              return `<ha-icon
                        icon="mdi:battery-charging"
                        style="; --mdc-icon-size: 14px; padding-left: 5px; padding-right: 2px; color: var(--primary-color); position: relative; bottom: 1px;">
                        </ha-icon><span>${states["[[battery]]"].attributes.battery}%</span>`
            }
          }
          ]]]
        wifi: |
          [[[
            if (states['[[wifi]]'].state =='<not connected>') { 
              return `<ha-icon
              icon="mdi:wifi-off"
              style="; --mdc-icon-size: 14px; padding-left: 6px; padding-right: 2px; color: var(--primary-color); position: relative; bottom: 1px;">
              </ha-icon> <span>N/A</span>`; 
            } else {
              return `<ha-icon
              icon="mdi:wifi"
              style="; --mdc-icon-size: 14px; padding-left: 6px; padding-right: 2px; color: var(--primary-color); position: relative; bottom: 1px;">
              </ha-icon><span>${states['[[wifi]]'].state}</span>`;
            }
          ]]]
        status: |
          [[[
            if (states['[[entity]]'].state =='not_home') { 
            return `<ha-icon icon="mdi:home-export-outline"
              style="; --mdc-icon-size: 14px; padding-left: 6px; padding-right: 2px; color: var(--primary-color); position: relative; bottom: 1px;">
              </ha-icon><span>Away</span>`;
            } 
            if (states['[[entity]]'].state =='home') { 
            return `<ha-icon 
              icon="mdi:home"
              style="; --mdc-icon-size: 14px; padding-left: 6px; padding-right: 2px; color: var(--primary-color); position: relative; bottom: 1px;">
              </ha-icon><span>Home</span>`;
            } else {
            return `<ha-icon 
              icon="mdi:map-marker-radius"
              style="; --mdc-icon-size: 14px; padding-left: 6px; padding-right: 2px; color: var(--primary-color); position: relative; bottom: 1px;">
              </ha-icon><span>${entity.state}</span>`;
            }
          ]]]
      state:
        - value: not_home
          styles:
            card:
              - opacity: 0.6
            entity_picture:
              - border: 3px solid var(--aurora-red)
        - value: Work
          styles:
            card:
              - opacity: 0.6
            entity_picture:
              - border: 3px solid var(--aurora-blue)
        - value: home
          styles:
            entity_picture:
              - border: 3px solid var(--aurora-green)
views:
  - theme: Nordic
    icon: mdi:home-assistant
    path: new
    title: Home
    badges: []
    cards:
      - cards:
          - entity_id:
              "1": null
            matches: ^toggle (.+\..+)
            max_results: 10
            name: Toggle {1}
            service: homeassistant.toggle
            service_data: null
            type: custom:search-card
          - entity: alarm_control_panel.panel
            name: Alarm
            states:
              - arm_home
              - arm_away
            type: alarm-panel
            theme: Nordic
          - type: horizontal-stack
            cards:
              - type: custom:decluttering-card
                template: person_card_new
                variables:
                  - entity: person.colton
                  - name: Colton
                  - show_name: false
                  - show_state: false
                  - battery: device_tracker.life360_colton
                  - wifi: sensor.colton_s_samsung_wifi_connection
                  - entity_picture: /local/colton.jpg
                  - show_entity_picture: true
                  - tap_action:
                      action: more-info
                      haptic: light
              - type: custom:decluttering-card
                template: person_card_new
                variables:
                  - entity: person.miranda
                  - name: Miranda
                  - show_name: false
                  - show_state: false
                  - battery: device_tracker.life360_miranda
                  - wifi: sensor.miranda_wifi_connection
                  - entity_picture: /local/miranda.jpg
                  - show_entity_picture: true
                  - tap_action:
                      action: more-info
                      haptic: light
          - cards:
              - show_name: true
                show_icon: true
                entity: input_boolean.override_home
                hold_action:
                  action: more-info
                icon_height: 50px
                show_state: true
                tap_action:
                  action: toggle
                type: button
                icon: ios:house-fill
                name: Override
              - show_name: true
                show_icon: true
                hold_action:
                  action: call-service
                  service: media_player.media_stop
                  service_data:
                    entity_id: media_player.bedroom_pair
                icon: ios:bed-double
                icon_height: 50px
                name: Sleep
                show_state: false
                tap_action:
                  action: call-service
                  service: shell_command.white_noise
                type: button
                card_mod:
                  style: |
                    span {
                    margin-bottom: 20px
                    }
              - show_name: true
